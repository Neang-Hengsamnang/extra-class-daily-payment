{% extends "base.html" %}
{% block title %}ចូលប្រើប្រាស់{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h2 class="mb-3">ចូលប្រើប្រាស់</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label>ឈ្មោះប្រើប្រាស់</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>ពាក្យសម្ងាត់</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="remember" id="remember">
                <label class="form-check-label" for="remember">ចងចាំខ្ញុំ</label>
            </div>
            <button type="submit" class="btn btn-primary w-100">ចូល</button>
        </form>
    </div>
</div>
{% endblock %}
